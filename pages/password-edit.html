<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 수정</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/password-edit.css">
</head>

<body>
  <header class="page-header">
    <button class="back-button" type="button">&lt;</button>

    <h1 class="page-header-title">아무 말 대잔치</h1>

    <div class="header-profile-area">
      <button
        class="header-profile-button"
        type="button"
        aria-label="프로필 메뉴 열기"
      ></button>

      <div class="profile-dropdown">
        <button class="dropdown-item user-edit-menu" type="button">
          회원정보수정
        </button>
        <button class="dropdown-item password-edit-menu" type="button">
          비밀번호수정
        </button>
        <button class="dropdown-item logout-menu" type="button">
          로그아웃
        </button>
      </div>
    </div>
  </header>

  <main class="password-edit-main">
    <h2 class="password-edit-title">비밀번호 수정</h2>

    <form class="password-edit-form">
      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input
          id="password"
          class="form-input password-input"
          type="password"
          placeholder="비밀번호를 입력하세요"
        >
        <p class="helper-text password-helper-text">
          비밀번호를 입력해주세요.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password-confirm">비밀번호 확인</label>
        <input
          id="password-confirm"
          class="form-input password-confirm-input"
          type="password"
          placeholder="비밀번호를 한번 더 입력하세요"
        >
        <p class="helper-text password-confirm-helper-text">
          비밀번호가 다릅니다.
        </p>
      </div>

      <button class="primary-button password-update-button" type="button">
        수정하기
      </button>
    </form>

    <div class="toast-message">
      수정완료
    </div>
  </main>

  <script type="module" src="../js/password-edit.js"></script>
</body>
</html>
