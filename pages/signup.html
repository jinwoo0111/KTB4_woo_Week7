<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>회원가입</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/signup.css">
</head>

<body data-page="signup">
  <header class="page-header global-header">
    <div class="global-header-inner">
      <div class="global-brand-area">
        <a class="page-header-title global-logo" href="./home.html">
          RESCENE FAN COMMUNITY
        </a>
      </div>

      <nav class="global-navigation" aria-label="주요 메뉴">
        <a class="global-nav-link" href="./home.html" data-nav-page="home">HOME</a>
        <a class="global-nav-link" href="./artist.html" data-nav-page="artist">ARTIST</a>
        <a class="global-nav-link" href="./posts.html" data-nav-page="community">COMMUNITY</a>
      </nav>

      <button class="header-profile-button" type="button" aria-label="로그인 페이지로 이동"></button>
    </div>
  </header>

  <main class="page-main signup-main">
    <section class="signup-card" aria-labelledby="signup-title">
      <p class="signup-kicker">RESCENE FAN COMMUNITY</p>
      <h2 class="page-title" id="signup-title">회원가입</h2>

      <form class="form signup-form">
        <div class="profile-section">
          <p class="profile-label">프로필 사진</p>

          <label class="profile-upload" for="profile-image">
            <span class="profile-plus-icon">+</span>
            <img
              class="profile-preview-image"
              src="../assets/rescene-default-profile.jpg"
              alt="기본 프로필 이미지"
            >
            <span class="profile-edit-badge">EDIT</span>
          </label>

          <input
            id="profile-image"
            class="profile-input"
            type="file"
            accept="image/*"
          >

          <p class="helper-text profile-helper-text">
            프로필 사진은 선택사항입니다.
          </p>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input
            class="form-input"
            id="email"
            type="email"
            autocomplete="email"
            placeholder="이메일을 입력하세요"
          >
          <p class="helper-text email-helper-text">
            이메일을 입력해주세요.
          </p>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input
            class="form-input"
            id="password"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 입력하세요"
          >
          <p class="helper-text password-helper-text">
            비밀번호를 입력해주세요.
          </p>
        </div>

        <div class="form-group">
          <label class="form-label" for="password-confirm">비밀번호 확인</label>
          <input
            class="form-input"
            id="password-confirm"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 한번 더 입력하세요"
          >
          <p class="helper-text password-confirm-helper-text">
            비밀번호가 다릅니다.
          </p>
        </div>

        <div class="form-group">
          <label class="form-label" for="nickname">닉네임</label>
          <input
            class="form-input"
            id="nickname"
            type="text"
            autocomplete="nickname"
            placeholder="닉네임을 입력하세요"
          >
          <p class="helper-text nickname-helper-text">
            닉네임을 입력해주세요.
          </p>
        </div>

        <button class="primary-button signup-button" type="button">
          회원가입
        </button>

        <button class="text-button login-link-button" type="button">
          로그인하러 가기
        </button>
      </form>

      <div class="toast-message" role="status" aria-live="polite">
        회원가입 성공
      </div>
    </section>
  </main>

  <script type="module" src="../js/common/navigation.js"></script>
  <script type="module" src="../js/signup.js?v=20260713-signup-skip-auth"></script>
</body>

</html>
