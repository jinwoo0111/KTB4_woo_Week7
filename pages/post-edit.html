<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시글 수정</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/post-form.css">
</head>

<body data-page="community">
  <header class="page-header global-header">
    <div class="global-header-inner">
      <div class="global-brand-area">
        <button class="back-button" type="button" aria-label="게시글 목록으로 이동">&lt;</button>
        <a class="page-header-title global-logo" href="./home.html">
          RESCENE FAN COMMUNITY
        </a>
      </div>

      <nav class="global-navigation" aria-label="주요 메뉴">
        <a class="global-nav-link" href="./home.html" data-nav-page="home">HOME</a>
        <a class="global-nav-link" href="./artist.html" data-nav-page="artist">ARTIST</a>
        <a class="global-nav-link" href="./posts.html" data-nav-page="community">COMMUNITY</a>
      </nav>

      <button class="header-profile-button" type="button" aria-label="마이페이지 또는 로그인으로 이동"></button>
    </div>
  </header>

  <main class="post-form-main">
    <h2 class="page-title">게시글 수정</h2>

    <form class="post-form">
      <div class="post-form-group">
        <label class="post-form-label" for="post-title">제목*</label>
        <input
          id="post-title"
          class="post-title-input"
          type="text"
          maxlength="26"
          value="제목 1"
        >
      </div>

      <div class="post-form-group">
        <label class="post-form-label" for="post-content">내용*</label>
        <textarea
          id="post-content"
          class="post-content-input"
        >무엇을 얘기할까요? 아무말이라면, 삶은 항상 놀라운 모험이라고 생각합니다. 우리는 매일 새로운 경험을 하고 배우며 성장합니다. 때로는 어려움과 도전이 있지만, 그것들이 우리를 더 강하고 지혜롭게 만듭니다. 또한 우리는 주변의 사람들과 연결되며 사랑과 지지를 받습니다. 그래서 우리의 삶은 소중하고 의미가 있습니다.
자연도 아름다운 이야기입니다. 우리 주변의 자연은 끝없는 아름다움과 신비로움을 담고 있습니다. 산, 바다, 숲, 하늘 등 모든 것이 우리를 놀라게 만들고 감동시킵니다. 자연은 우리의 생명과 안정을 지키며 우리에게 힘을 주는 곳입니다.
마지막으로, 지식을 향한 탐구는 항상 흥미로운 여정입니다. 우리는 끝없는 지식의 바다에서 배우고 발견할 수 있으며, 이것이 우리를 더 깊이 이해하고 세상을 더 넓게 보게 해줍니다. 그런 의미에서, 삶은 놀라움과 경이로움으로 가득 차 있습니다. 새로운 경험을 즐기고 항상 앞으로 나아가는 것이 중요하다고 생각합니다.</textarea>

        <p class="helper-text post-helper-text">
          제목, 내용을 모두 작성해주세요.
        </p>
      </div>

      <div class="image-upload-section">
        <label class="post-form-label" for="post-image">이미지</label>

        <div class="image-input-row">
          <input
            id="post-image"
            class="post-image-input"
            type="file"
            accept="image/*"
          >

          <span class="existing-file-name">기존 파일 명</span>
        </div>
      </div>

      <button class="primary-button post-submit-button edit-submit-button" type="button">
        수정하기
      </button>
    </form>
  </main>

  <script type="module" src="../js/common/navigation.js"></script>
  <script type="module" src="../js/post-edit.js"></script>
</body>
</html>
