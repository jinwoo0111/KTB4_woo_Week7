<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>게시글 상세</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/post-detail.css">
</head>

<body data-page="community">
  <header class="page-header global-header">
    <div class="global-header-inner">
      <div class="global-brand-area">
        <a class="page-header-title global-logo" href="./home.html">
          RESCENE FAN COMMUNITY
        </a>
      </div>

      <nav class="global-navigation" aria-label="주요 메뉴">
        <a class="global-nav-link" href="./home.html" data-nav-page="home">HOME</a>
        <a class="global-nav-link" href="./artist.html" data-nav-page="artist">ARTIST</a>
        <a class="global-nav-link" href="./posts.html" data-nav-page="community">COMMUNITY</a>
      </nav>

      <button class="header-profile-button" type="button" aria-label="마이페이지 또는 로그인으로 이동"></button>
    </div>
  </header>

  <main class="detail-main">
    <article class="post-detail">
      <div class="post-detail-header">
        <h1 class="post-detail-title"></h1>

        <div class="post-action-buttons">
          <button class="outline-button edit-post-button" type="button" hidden>수정</button>
          <button class="outline-button delete-post-button" type="button" hidden>
            삭제
          </button>
        </div>
      </div>

      <div class="post-meta-row">
        <div class="author-info">
          <div class="author-profile"></div>
          <span class="author-name"></span>
        </div>

        <time class="post-date"></time>
      </div>

      <div class="divider"></div>

      <img
        class="post-image-placeholder"
        alt="게시글 이미지"
      >

      <p class="post-content"></p>

      <div class="post-counts">
        <button class="count-box like-button" type="button">
          <strong>123</strong>
          <span>좋아요수</span>
        </button>

        <div class="count-box">
          <strong>123</strong>
          <span>조회수</span>
        </div>

        <div class="count-box">
          <strong>123</strong>
          <span>댓글</span>
        </div>
      </div>
    </article>

    <section class="comment-write-section">
      <textarea class="comment-input" placeholder="댓글을 남겨주세요!"></textarea>

      <p class="helper-text comment-helper-text">
        댓글을 입력해주세요.
      </p>

      <div class="comment-button-row">
        <button class="comment-submit-button" type="button">
          댓글 등록
        </button>
      </div>
    </section>

    <section class="comment-list">
    </section>

    <!-- 게시글 삭제 확인 모달 -->
    <div class="modal-overlay post-delete-modal">
      <div class="confirm-modal">
        <h3 class="confirm-modal-title">게시글을 삭제하시겠습니까?</h3>
        <p class="confirm-modal-description">삭제한 내용은 복구 할 수 없습니다.</p>

        <div class="confirm-modal-buttons">
          <button class="modal-cancel-button post-delete-cancel-button" type="button">
            취소
          </button>
          <button class="modal-confirm-button post-delete-confirm-button" type="button">
            확인
          </button>
        </div>
      </div>
    </div>

    <!-- 댓글 삭제 확인 모달 -->
    <div class="modal-overlay comment-delete-modal">
      <div class="confirm-modal">
        <h3 class="confirm-modal-title">댓글을 삭제하시겠습니까?</h3>
        <p class="confirm-modal-description">삭제한 내용은 복구 할 수 없습니다.</p>

        <div class="confirm-modal-buttons">
          <button class="modal-cancel-button comment-delete-cancel-button" type="button">
            취소
          </button>
          <button class="modal-confirm-button comment-delete-confirm-button" type="button">
            확인
          </button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="../js/common/navigation.js"></script>
  <script type="module" src="../js/post-detail.js"></script>
</body>

</html>
