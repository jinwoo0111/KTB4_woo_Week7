<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>회원정보수정</title>

    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/user-edit.css">
</head>

<body>
    <header class="page-header">
        <h1 class="page-header-title">아무 말 대잔치</h1>

        <div class="header-profile-area">
            <button class="header-profile-button" type="button" aria-label="프로필 메뉴 열기"></button>

            <div class="profile-dropdown">
                <button class="dropdown-item user-edit-menu" type="button">
                    회원정보수정
                </button>
                <button class="dropdown-item password-edit-menu" type="button">
                    비밀번호수정
                </button>
                <button class="dropdown-item logout-menu" type="button">
                    로그아웃
                </button>
            </div>
        </div>
    </header>

    <main class="user-edit-main">
        <h2 class="user-edit-title">회원정보수정</h2>

        <section class="profile-edit-section">
            <p class="profile-section-label">프로필 사진*</p>

            <button class="profile-image-button" type="button">
                <span class="profile-change-text">변경</span>
            </button>
        </section>

        <form class="user-edit-form">
            <div class="email-section">
                <p class="form-label">이메일</p>
                <p class="user-email">startupcode@gmail.com</p>
            </div>

            <div class="form-group">
                <label class="form-label" for="nickname">닉네임</label>
                <input id="nickname" class="form-input nickname-input" type="text" value="스타트업코드">
                <p class="helper-text nickname-helper-text">닉네임을 입력해주세요.</p>
            </div>

            <button class="primary-button user-update-button" type="button">
                수정하기
            </button>

            <button class="text-button user-delete-button" type="button">
                회원 탈퇴
            </button>
        </form>

        <div class="toast-message">
            수정완료
        </div>
    </main>

    <!-- 회원 탈퇴 확인 모달 -->
    <div class="modal-overlay user-delete-modal">
        <div class="confirm-modal">
            <h3 class="confirm-modal-title">회원탈퇴 하시겠습니까?</h3>
            <p class="confirm-modal-description">
                작성된 게시글과 댓글은 삭제됩니다.
            </p>

            <div class="confirm-modal-buttons">
                <button class="modal-cancel-button user-delete-cancel-button" type="button">
                    취소
                </button>
                <button class="modal-confirm-button user-delete-confirm-button" type="button">
                    확인
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/user-edit.js"></script>
</body>

</html>
