<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 변경</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/user-edit.css">
  <link rel="stylesheet" href="../css/password-edit.css">
</head>

<body data-page="mypage">
  <header class="page-header global-header">
    <div class="global-header-inner">
      <div class="global-brand-area">
        <a class="page-header-title global-logo" href="./home.html">
          RESCENE FAN COMMUNITY
        </a>
      </div>

      <nav class="global-navigation" aria-label="주요 메뉴">
        <a class="global-nav-link" href="./home.html" data-nav-page="home">HOME</a>
        <a class="global-nav-link" href="./artist.html" data-nav-page="artist">ARTIST</a>
        <a class="global-nav-link" href="./posts.html" data-nav-page="community">COMMUNITY</a>
      </nav>

      <button class="header-profile-button" type="button" aria-label="마이페이지"></button>
    </div>
  </header>

  <main class="user-edit-main">
    <section class="mypage-intro">
      <h1 class="user-edit-title">MY PAGE</h1>
    </section>

    <div class="mypage-layout">
      <aside class="mypage-sidebar" aria-label="마이페이지 메뉴">
        <p class="mypage-sidebar-label">ACCOUNT</p>

        <button class="mypage-menu-button user-edit-menu" type="button">
          <span class="mypage-menu-number">01</span>
          <span>회원정보 변경</span>
        </button>

        <button class="mypage-menu-button is-active" type="button">
          <span class="mypage-menu-number">02</span>
          <span>비밀번호 변경</span>
        </button>

        <button class="mypage-logout-button logout-menu" type="button">
          <span class="mypage-menu-number">03</span>
          로그아웃
        </button>
      </aside>

      <section class="profile-card" aria-labelledby="password-card-title">
        <div class="profile-card-topline">
          <span>PROFILE  /  02</span>
          <span class="profile-card-status">REMINE</span>
        </div>

        <div class="password-summary">
          <div class="profile-image-wrap">
            <div class="password-profile-image" aria-label="프로필 사진"></div>
          </div>

          <div class="profile-identity">
            <p class="profile-identity-label">INFO</p>
            <h2 id="password-card-title" class="profile-display-name">회원님</h2>
            <p class="user-email"></p>
          </div>
        </div>

        <div class="profile-divider"></div>

        <form class="password-edit-form">
          <div class="profile-info-heading">
            <p class="profile-section-label">SECURITY</p>
            <span>02 / 02</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">새 비밀번호</label>
            <input
              id="password"
              class="form-input password-input"
              type="password"
              autocomplete="new-password"
              placeholder="새 비밀번호를 입력하세요"
            >
            <p class="helper-text password-helper-text">비밀번호를 입력해주세요.</p>
          </div>

          <div class="form-group">
            <label class="form-label" for="password-confirm">새 비밀번호 확인</label>
            <input
              id="password-confirm"
              class="form-input password-confirm-input"
              type="password"
              autocomplete="new-password"
              placeholder="새 비밀번호를 한번 더 입력하세요"
            >
            <p class="helper-text password-confirm-helper-text">비밀번호가 다릅니다.</p>
          </div>

          <button class="primary-button password-update-button" type="button">
            비밀번호 저장
          </button>
        </form>
      </section>
    </div>

    <div class="toast-message">수정완료</div>
  </main>

  <script type="module" src="../js/common/navigation.js"></script>
  <script type="module" src="../js/password-edit.js"></script>
</body>
</html>
