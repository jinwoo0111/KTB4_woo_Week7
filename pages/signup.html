<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>회원가입</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/signup.css">
</head>

<body>
  <header class="page-header">
    <button class="back-button" type="button">&lt;</button>
    <h1 class="page-header-title">아무 말 대잔치</h1>
  </header>

  <main class="page-main signup-main">
    <h2 class="page-title">회원가입</h2>

    <form class="form signup-form">
      <div class="profile-section">
        <p class="profile-label">프로필 사진*</p>

        <label class="profile-upload" for="profile-image">
          <span class="profile-plus-icon">+</span>
          <img class="profile-preview-image" alt="프로필 미리보기">
        </label>

        <input
          id="profile-image"
          class="profile-input"
          type="file"
          accept="image/*"
        >

        <p class="helper-text profile-helper-text">
          프로필 사진을 추가해주세요.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">이메일*</label>
        <input
          class="form-input"
          id="email"
          type="email"
          placeholder="이메일을 입력하세요"
        >
        <p class="helper-text email-helper-text">
          이메일을 입력해주세요.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">비밀번호*</label>
        <input
          class="form-input"
          id="password"
          type="password"
          placeholder="비밀번호를 입력하세요"
        >
        <p class="helper-text password-helper-text">
          비밀번호를 입력해주세요.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password-confirm">비밀번호 확인*</label>
        <input
          class="form-input"
          id="password-confirm"
          type="password"
          placeholder="비밀번호를 한번 더 입력하세요"
        >
        <p class="helper-text password-confirm-helper-text">
          비밀번호가 다릅니다.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="nickname">닉네임*</label>
        <input
          class="form-input"
          id="nickname"
          type="text"
          placeholder="닉네임을 입력하세요"
        >
        <p class="helper-text nickname-helper-text">
          닉네임을 입력해주세요.
        </p>
      </div>

      <button class="primary-button signup-button" type="button">
        회원가입
      </button>

      <button class="text-button login-link-button" type="button">
        로그인하러 가기
      </button>
    </form>
  </main>

  <script type="module" src="../js/signup.js"></script>
</body>

</html>
