<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시글 작성</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/post-form.css">
</head>

<body>
  <header class="page-header">
    <button class="back-button" type="button">&lt;</button>
    <h1 class="page-header-title">아무 말 대잔치</h1>

    <button class="header-profile-button" type="button"></button>
  </header>

  <main class="post-form-main">
    <h2 class="page-title">게시글 작성</h2>

    <form class="post-form">
      <div class="post-form-group">
        <label class="post-form-label" for="post-title">제목*</label>
        <input
          id="post-title"
          class="post-title-input"
          type="text"
          maxlength="26"
          placeholder="제목을 입력해주세요. (최대 26글자)"
        >
        <p class="helper-text title-helper-text">제목은 최대 26자 입니다.</p>
      </div>

      <div class="post-form-group">
        <label class="post-form-label" for="post-content">내용*</label>
        <textarea
          id="post-content"
          class="post-content-input"
          placeholder="내용을 입력해주세요."
        ></textarea>

        <p class="helper-text post-helper-text">
          제목, 내용을 모두 작성해주세요.
        </p>
      </div>

      <div class="image-upload-section">
        <label class="post-form-label" for="post-image">이미지</label>

        <div class="image-input-row">
          <input
            id="post-image"
            class="post-image-input"
            type="file"
            accept="image/*"
          >
        </div>
      </div>

      <button class="primary-button post-submit-button" type="button">
        완료
      </button>
    </form>
  </main>

  <script type="module" src="../js/post-create.js"></script>
</body>
</html>
