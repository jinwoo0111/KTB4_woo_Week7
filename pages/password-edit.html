<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 수정</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/password-edit.css">
</head>

<body data-page="mypage">
  <header class="page-header global-header">
    <div class="global-header-inner">
      <div class="global-brand-area">
        <button class="back-button" type="button" aria-label="회원정보 수정으로 이동">&lt;</button>
        <a class="page-header-title global-logo" href="./home.html">
          RESCENE FAN COMMUNITY
        </a>
      </div>

      <nav class="global-navigation" aria-label="주요 메뉴">
        <a class="global-nav-link" href="./home.html" data-nav-page="home">HOME</a>
        <a class="global-nav-link" href="./artist.html" data-nav-page="artist">ARTIST</a>
        <a class="global-nav-link" href="./posts.html" data-nav-page="community">COMMUNITY</a>
      </nav>

      <div class="header-profile-area">
        <button
          class="header-profile-button"
          type="button"
          aria-label="회원정보 수정으로 이동"
        ></button>

        <div class="profile-dropdown">
          <button class="dropdown-item user-edit-menu" type="button">
            회원정보수정
          </button>
          <button class="dropdown-item password-edit-menu" type="button">
            비밀번호수정
          </button>
          <button class="dropdown-item logout-menu" type="button">
            로그아웃
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="password-edit-main">
    <h2 class="password-edit-title">비밀번호 수정</h2>

    <form class="password-edit-form">
      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input
          id="password"
          class="form-input password-input"
          type="password"
          placeholder="비밀번호를 입력하세요"
        >
        <p class="helper-text password-helper-text">
          비밀번호를 입력해주세요.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password-confirm">비밀번호 확인</label>
        <input
          id="password-confirm"
          class="form-input password-confirm-input"
          type="password"
          placeholder="비밀번호를 한번 더 입력하세요"
        >
        <p class="helper-text password-confirm-helper-text">
          비밀번호가 다릅니다.
        </p>
      </div>

      <button class="primary-button password-update-button" type="button">
        수정하기
      </button>
    </form>

    <div class="toast-message">
      수정완료
    </div>
  </main>

  <script type="module" src="../js/common/navigation.js"></script>
  <script type="module" src="../js/password-edit.js"></script>
</body>
</html>
