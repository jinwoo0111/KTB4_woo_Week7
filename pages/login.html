<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/login.css">
</head>

<body data-page="login">
  <header class="page-header global-header">
    <div class="global-header-inner">
      <div class="global-brand-area">
        <a class="page-header-title global-logo" href="./home.html">
          RESCENE FAN COMMUNITY
        </a>
      </div>

      <nav class="global-navigation" aria-label="주요 메뉴">
        <a class="global-nav-link" href="./home.html" data-nav-page="home">HOME</a>
        <a class="global-nav-link" href="./artist.html" data-nav-page="artist">ARTIST</a>
        <a class="global-nav-link" href="./posts.html" data-nav-page="community">COMMUNITY</a>
      </nav>

      <button class="header-profile-button" type="button" aria-label="로그인 페이지로 이동"></button>
    </div>
  </header>

  <main class="page-main login-main">
    <section class="login-card" aria-labelledby="login-title">
      <p class="login-kicker">RESCENE FAN COMMUNITY</p>
      <h2 class="page-title" id="login-title">로그인</h2>

      <form class="form login-form">
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input
            class="form-input"
            id="email"
            type="email"
            autocomplete="email"
            placeholder="이메일을 입력하세요"
          >
          <p class="helper-text email-helper-text">
            이메일을 입력해주세요.
          </p>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input
            class="form-input"
            id="password"
            type="password"
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
          >
          <p class="helper-text password-helper-text">
            비밀번호를 입력해주세요.
          </p>
        </div>

        <p class="helper-text login-fail-helper-text">
          아이디 또는 비밀번호를 확인해주세요.
        </p>

        <button class="primary-button login-button" type="button">
          로그인
        </button>

        <button class="text-button signup-button" type="button">
          회원가입
        </button>
      </form>
    </section>
  </main>

  <script type="module" src="../js/common/navigation.js"></script>
  <script type="module" src="../js/login.js?v=20260713-login-skip-auth"></script>
</body>
</html>
