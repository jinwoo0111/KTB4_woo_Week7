<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Community</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/posts.css">
</head>
<body data-page="community">
  <header class="page-header global-header">
    <div class="global-header-inner">
      <div class="global-brand-area">
        <a class="page-header-title global-logo" href="./home.html">
          RESCENE FAN COMMUNITY
        </a>
      </div>

      <nav class="global-navigation" aria-label="주요 메뉴">
        <a class="global-nav-link" href="./home.html" data-nav-page="home">HOME</a>
        <a class="global-nav-link" href="./artist.html" data-nav-page="artist">ARTIST</a>
        <a class="global-nav-link" href="./posts.html" data-nav-page="community">COMMUNITY</a>
      </nav>

      <button class="header-profile-button" type="button" aria-label="마이페이지 또는 로그인으로 이동"></button>
    </div>
  </header>

  <main class="posts-main">
    <section class="community-heading" aria-labelledby="community-title">
      <div class="community-title-row">
        <span class="community-document-icon" aria-hidden="true"></span>
        <h1 id="community-title">Community</h1>
      </div>
    </section>

    <section class="post-toolbar" aria-label="게시글 보기 설정">
      <div class="post-toolbar-actions">
        <button class="write-post-button" type="button">
          글쓰기
        </button>

        <div class="post-view-toggle" role="group" aria-label="게시글 보기 방식">
          <button
            class="post-view-button"
            type="button"
            data-view-mode="list"
            aria-label="줄글형으로 보기"
            aria-pressed="true"
          >
            <span class="list-view-icon" aria-hidden="true"></span>
          </button>

          <span class="post-view-divider" aria-hidden="true"></span>

          <button
            class="post-view-button"
            type="button"
            data-view-mode="card"
            aria-label="카드형으로 보기"
            aria-pressed="false"
          >
            <span class="card-view-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </section>

    <section class="post-list is-list-view" id="post-list" aria-live="polite"></section>

    <div class="post-load-state" id="post-load-state" role="status">
      게시글을 불러오는 중입니다.
    </div>

    <div class="post-scroll-sentinel" id="post-scroll-sentinel" aria-hidden="true"></div>
  </main>

  <button class="scroll-top-button" type="button" aria-label="맨 위로 이동">
    ↑
  </button>

  <script type="module" src="../js/common/navigation.js"></script>
  <script type="module" src="../js/posts.js?v=20260713-community-optional-image"></script>
</body>
</html>
