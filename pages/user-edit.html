<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>회원정보수정</title>

    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/user-edit.css">
</head>

<body data-page="mypage">
    <header class="page-header global-header">
        <div class="global-header-inner">
            <div class="global-brand-area">
                <a class="page-header-title global-logo" href="./home.html">
                    RESCENE FAN COMMUNITY
                </a>
            </div>

            <nav class="global-navigation" aria-label="주요 메뉴">
                <a class="global-nav-link" href="./home.html" data-nav-page="home">HOME</a>
                <a class="global-nav-link" href="./artist.html" data-nav-page="artist">ARTIST</a>
                <a class="global-nav-link" href="./posts.html" data-nav-page="community">COMMUNITY</a>
            </nav>

            <button class="header-profile-button" type="button" aria-label="마이페이지"></button>
        </div>
    </header>

    <main class="user-edit-main">
        <section class="mypage-intro">
            <h1 class="user-edit-title">MY PAGE</h1>
        </section>

        <div class="mypage-layout">
            <aside class="mypage-sidebar" aria-label="마이페이지 메뉴">
                <p class="mypage-sidebar-label">ACCOUNT</p>

                <button class="mypage-menu-button is-active" type="button">
                    <span class="mypage-menu-number">01</span>
                    <span>회원정보 변경</span>
                </button>

                <button class="mypage-menu-button password-edit-menu" type="button">
                    <span class="mypage-menu-number">02</span>
                    <span>비밀번호 변경</span>
                </button>

                <button class="mypage-logout-button logout-menu" type="button">
                    <span class="mypage-menu-number">03</span>
                    로그아웃
                </button>
            </aside>

            <section class="profile-card" aria-labelledby="profile-card-title">
                <div class="profile-card-topline">
                    <span>PROFILE  /  01</span>
                    <span class="profile-card-status">REMINE</span>
                </div>

                <div class="profile-summary">
                    <div class="profile-image-wrap">
                        <button class="profile-image-button" type="button" aria-label="프로필 사진 변경">
                            <span class="profile-change-text">EDIT</span>
                        </button>
                        <input id="profile-image" class="profile-image-input" type="file" accept="image/*">
                    </div>

                    <div class="profile-identity">
                        <p class="profile-identity-label">INFO</p>
                        <h2 id="profile-card-title" class="profile-display-name">회원님</h2>
                        <p class="user-email"></p>
                    </div>
                </div>

                <div class="profile-divider"></div>

                <form class="user-edit-form">
                    <div class="profile-info-heading">
                        <p class="profile-section-label">PERSONAL INFO</p>
                        <span>01 / 02</span>
                    </div>

                    <div class="email-section">
                        <p class="form-label">이메일</p>
                        <p class="profile-readonly-value user-email-copy"></p>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="nickname">닉네임</label>
                        <input id="nickname" class="form-input nickname-input" type="text" autocomplete="nickname">
                        <p class="helper-text nickname-helper-text">닉네임을 입력해주세요.</p>
                    </div>

                    <button class="primary-button user-update-button" type="button">
                        회원정보 저장
                    </button>

                    <button class="text-button user-delete-button" type="button">
                        회원 탈퇴
                    </button>
                </form>
            </section>
        </div>

        <div class="toast-message">
            수정완료
        </div>
    </main>

    <!-- 회원 탈퇴 확인 모달 -->
    <div class="modal-overlay user-delete-modal">
        <div class="confirm-modal">
            <h3 class="confirm-modal-title">회원탈퇴 하시겠습니까?</h3>
            <p class="confirm-modal-description">
                작성된 게시글과 댓글은 삭제됩니다.
            </p>

            <div class="confirm-modal-buttons">
                <button class="modal-cancel-button user-delete-cancel-button" type="button">
                    취소
                </button>
                <button class="modal-confirm-button user-delete-confirm-button" type="button">
                    확인
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/common/navigation.js"></script>
    <script type="module" src="../js/user-edit.js"></script>
</body>

</html>
