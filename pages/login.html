<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>

  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>
  <header class="page-header">
    <h1 class="page-header-title">아무 말 대잔치</h1>
  </header>

  <main class="page-main login-main">
    <h2 class="page-title">로그인</h2>

    <form class="form login-form">
      <div class="form-group">
        <label class="form-label" for="email">이메일</label>
        <input
          class="form-input"
          id="email"
          type="email"
          placeholder="이메일을 입력하세요"
        >
        <p class="helper-text email-helper-text">
          이메일을 입력해주세요.
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input
          class="form-input"
          id="password"
          type="password"
          placeholder="비밀번호를 입력하세요"
        >
        <p class="helper-text password-helper-text">
          비밀번호를 입력해주세요.
        </p>
      </div>

      <p class="helper-text login-fail-helper-text">
        아이디 또는 비밀번호를 확인해주세요.
      </p>

      <button class="primary-button login-button" type="button">
        로그인
      </button>

      <button class="text-button signup-button" type="button">
        회원가입
      </button>
    </form>
  </main>

  <script type="module" src="../js/login.js"></script>
</body>
</html>
